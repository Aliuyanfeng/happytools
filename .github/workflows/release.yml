name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  WAILS_VERSION: "v3.0.0-alpha.66"

jobs:
  # ==================== 构建任务 ====================
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build-task: windows:package
            artifact-name: happytools-windows
            artifact-path: bin/*.exe

          - os: macos-latest
            platform: macos
            build-task: darwin:package:universal
            artifact-name: happytools-macos
            artifact-path: |
              bin/HappyTools.app
              bin/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Windows 特定依赖
      - name: Install Windows Dependencies (Windows)
        if: runner.os == 'Windows'
        uses: crazy-max/ghaction-chocolatey@v2
        with:
          args: install nsis -y

      - name: Install Wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build & Package
        run: wails3 task ${{ matrix.build-task }}
        env:
          CGO_ENABLED: ${{ runner.os == 'Windows' && '0' || '1' }}

      # macOS 创建 DMG (可选)
      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          create-dmg --volname "HappyTools" --window-pos 200 120 --window-size 800 400 --icon-size 100 --app-drop-link 600 185 "bin/HappyTools.dmg" "bin/HappyTools.app"
        continue-on-error: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 7

  # ==================== 发布任务 ====================
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: happytools-windows
          path: artifacts/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: happytools-macos
          path: artifacts/macos

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets

          # Windows
          if ls artifacts/windows/*.exe 1> /dev/null 2>&1; then
            cp artifacts/windows/*.exe release-assets/
          fi

          # macOS - Create ZIP for .app
          if [ -d artifacts/macos/HappyTools.app ]; then
            cd artifacts/macos
            zip -r ../../release-assets/HappyTools-macos.zip HappyTools.app
            cd ../..
          fi
          if ls artifacts/macos/*.dmg 1> /dev/null 2>&1; then
            cp artifacts/macos/*.dmg release-assets/
          fi

          echo "📦 Release Assets:"
          ls -lh release-assets/

      - name: Generate Release Notes
        id: release_notes
        run: |
          cat << EOF > release_notes.md
          ## HappyTools ${{ steps.get_version.outputs.VERSION }}

          ### 新功能
          - 跨平台桌面应用支持
          - 基于 Wails v3 + Vue 3 构建

          ### 下载说明

          #### Windows
          - \`HappyTools-Setup.exe\` - Windows 安装程序 (推荐)

          #### macOS
          - \`HappyTools-macos.zip\` - macOS 应用程序包 (支持 Intel 和 Apple Silicon)
          - \`HappyTools.dmg\` - macOS DMG 镜像 (可选)

          ### 系统要求
          - **Windows**: Windows 10/11 (需要 WebView2 运行时)
          - **macOS**: macOS 10.15+ (支持 Intel 和 Apple Silicon)

          ---

          **完整更新日志**: https://github.com/${{ github.repository }}/compare/${{ steps.get_version.outputs.VERSION }}...HEAD
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: HappyTools ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Artifacts
        run: |
          rm -rf artifacts release-assets
